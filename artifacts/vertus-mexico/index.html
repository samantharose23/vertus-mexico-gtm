<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Consent Mode v2 — defaults (deny everywhere until the visitor chooses). MUST stay above the GTM loader. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied',
        'wait_for_update': 500
      });
      gtag('set', 'ads_data_redaction', true);
      /* Replay a returning visitor's stored choice immediately so it lands
         within the wait_for_update window, before GTM loads. Storage key must
         stay in sync with CONSENT_STORAGE_KEY in src/components/consent.config.ts. */
      (function(){
        try {
          var raw = localStorage.getItem('vertus_consent');
          if (!raw) return;
          var v = JSON.parse(raw);
          if (v && v.analytics && v.ads) {
            gtag('consent', 'update', {
              'analytics_storage': v.analytics,
              'ad_storage': v.ads,
              'ad_user_data': v.ads,
              'ad_personalization': v.ads
            });
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
    <!-- Google Tag Manager — guarded loader. ID comes from the VITE_GTM_ID env var; stays dormant if unset. -->
    <script>
      (function(){
        var GTM_ID = "%VITE_GTM_ID%";
        if (GTM_ID.indexOf("GTM-") !== 0) return; /* dormant until a real ID is set */
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer',GTM_ID);
      })();
    </script>
    <!-- End Google Tag Manager -->
    <title>Vertus Group Mexico — Capital permanente en México</title>

    />
