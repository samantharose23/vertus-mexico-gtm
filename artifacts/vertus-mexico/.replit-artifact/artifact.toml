kind = "web"
previewPath = "/"
title = "Vertus Group Mexico"
version = "1.0.0"
id = "artifacts/vertus-mexico"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20879

[services.development]
run = "pnpm --filter @workspace/vertus-mexico run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vertus-mexico", "run", "build" ]
publicDir = "artifacts/vertus-mexico/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20879"
BASE_PATH = "/"
